version: "2"
linters:
  default: all
  disable:
    - cyclop # noisy
    - err113 # noisy
    - errchkjson # noisy
    - exhaustruct # noisy
    - forbidigo # unnecessary
    - funcorder # noisy
    - funlen # noisy
    - gochecknoglobals # provider registry and lipgloss styles are globals
    - gochecknoinits # provider self-registration uses init()
    - gocognit # noisy
    - goconst # noisy
    - gocyclo # noisy
    - godot # noisy
    - gomoddirectives # unnecessary
    - gomodguard # deprecated
    - inamedparam # noisy
    - ireturn # noisy
    - lll # noisy
    - maintidx # noisy
    - makezero # noisy
    - nlreturn # noisy
    - noinlineerr # unnecessary
    - paralleltest # noisy
    - perfsprint # noisy
    - prealloc # noisy
    - tagalign # broken
    - tagliatelle # GitHub API uses camelCase
    - varnamelen # noisy
    - wrapcheck # noisy
    - wsl # noisy
    - wsl_v5 # noisy

  settings:
    tagalign:
      strict: true
      order:
        - name
        - help
        - short
        - aliases
        - negatable
        - placeholder
        - desc
        - complete
        - arg
        - optional
        - hidden
        - clib
    cyclop:
      max-complexity: 30
      package-average: 10
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/davecgh/go-spew/spew
              desc: debug packages should only be imported during development
            - pkg: github.com/mitranim/gg/grepr
              desc: debug packages should only be imported during development
    errcheck:
      check-type-assertions: true
    exhaustive:
      check:
        - switch
        - map
    exhaustruct:
      exclude:
        - ^net/http.Client$
        - ^net/http.Cookie$
        - ^net/http.Request$
        - ^net/http.Response$
        - ^net/http.Server$
        - ^net/http.Transport$
        - ^net/url.URL$
        - ^os/exec.Cmd$
        - ^reflect.StructField$
        - ^golang.org/x/tools/go/analysis.Analyzer$
        - ^gopkg.in/yaml.v3.Node$
    funlen:
      lines: -1
      statements: 80
    gocognit:
      min-complexity: 40
    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false
    govet:
      disable:
        - fieldalignment
      enable-all: true
      settings:
        printf:
          funcs:
            - (github.com/rs/zerolog.Event).Msgf
        shadow:
          strict: false
    mnd:
      ignored-functions:
        - os.Chmod
        - os.Mkdir
        - os.MkdirAll
        - os.OpenFile
        - os.WriteFile
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-no-explanation:
        - funlen
        - gocognit
        - lll
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - lll
        source: ^//\s*go:generate\s
      - linters:
          - godot
        source: (noinspection|TODO)
      - linters:
          - gocritic
        source: //noinspection
      - linters:
          - bodyclose
          - dupl
          - funlen
          - gochecknoglobals
          - goconst
          - gosec
          - lll
          - noctx
          - wrapcheck
        path: _test\.go
      - linters:
          - cyclop
        path: cmd/clover/main\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 50
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
