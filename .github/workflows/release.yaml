name: release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions: {}

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    # clover: provider=auto
    uses: gechr/actions/.github/workflows/release.yaml@24aa7833c41452ff05697bdf2dd48f023bcdf33b # v0.2.5
    secrets: inherit
    with:
      language: go
      name: clover
      desc: "Automatically manage version strings across arbitrary files"
