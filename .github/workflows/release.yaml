name: release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions: {}

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    # @clover
    uses: gechr/actions/.github/workflows/release.yaml@f86637c131004611b2346f2f3102ed291b13a412 # v0.2.9
    secrets:
      RELEASER_APP_PRIVATE_KEY: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
    with:
      language: go
      name: clover
      desc: "Automatically manage version strings across arbitrary files"
