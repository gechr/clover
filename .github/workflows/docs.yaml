name: docs

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  MDBOOK_VERSION: "0.5.2"

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        # clover: provider=auto
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install mdbook
        run: |
          wget -qO mdbook.tar.gz "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar xf mdbook.tar.gz -C /usr/local/bin mdbook
          rm mdbook.tar.gz
          mdbook --version
      - name: Build
        run: make -C docs build
      - name: Setup Pages
        # clover: provider=auto
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        # clover: provider=auto
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'docs/book'
      - name: Deploy to GitHub Pages
        id: deployment
        # clover: provider=auto
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
